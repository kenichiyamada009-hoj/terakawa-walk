<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a2e0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>テラ川お散歩MAP</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- GAME PAGE -->
    <section class="page active" id="page-map">
      <!-- Phaser canvas goes here -->
      <div id="game-container"></div>

      <!-- キャラクター (画面中央固定) -->
      <div id="tera-wrap">
        <div class="speech-bubble" id="speech-bubble"></div>
        <div class="tera-char" id="tera-icon">
          <div class="c-head">
            <div class="c-hair"></div>
            <div class="c-face">
              <div class="c-eyes"></div>
            </div>
          </div>
          <div class="c-mid">
            <div class="c-arm c-arm-l"></div>
            <div class="c-torso"></div>
            <div class="c-arm c-arm-r"></div>
          </div>
          <div class="c-legs">
            <div class="c-leg c-leg-l"><div class="c-boot"></div></div>
            <div class="c-leg c-leg-r"><div class="c-boot"></div></div>
          </div>
        </div>
      </div>

      <!-- GPS状態 -->
      <div id="gps-badge" class="gps-badge">GPS待機中</div>

      <!-- レベルバッジ -->
      <div id="level-badge" class="level-badge">テラ川見習い</div>

      <!-- 下部HUD -->
      <div class="game-hud">
        <div class="hud-item">
          <span class="hud-val" id="bar-distance">0m</span>
          <span class="hud-lbl">距離</span>
        </div>
        <div class="hud-sep"></div>
        <div class="hud-item">
          <span class="hud-val" id="bar-steps">0</span>
          <span class="hud-lbl">歩数</span>
        </div>
        <div class="hud-sep"></div>
        <div class="hud-item">
          <span class="hud-val" id="bar-time">00:00</span>
          <span class="hud-lbl">時間</span>
        </div>
      </div>
    </section>

    <!-- STATS PAGE -->
    <section class="page" id="page-stats">
      <div class="stats-scroll">
        <div class="level-card">
          <div class="avatar-circle">
            <img src="assets/face.png" alt="テラ川">
          </div>
          <div class="level-info">
            <div id="s-level-title" class="s-level-title">テラ川見習い</div>
            <div class="level-bar-wrap">
              <div id="s-level-bar" class="level-bar" style="width:0%"></div>
            </div>
          </div>
        </div>

        <div class="stats-section-title">今日の記録</div>
        <div class="stats-grid">
          <div class="stat-card"><span class="stat-label">歩数</span><span class="stat-value" id="s-steps">0</span></div>
          <div class="stat-card"><span class="stat-label">距離</span><span class="stat-value" id="s-distance">0m</span></div>
          <div class="stat-card"><span class="stat-label">歩行時間</span><span class="stat-value" id="s-time">0分</span></div>
          <div class="stat-card"><span class="stat-label">消費カロリー</span><span class="stat-value" id="s-cal">0kcal</span></div>
        </div>

        <div class="stats-section-title">累計記録</div>
        <div class="stats-grid">
          <div class="stat-card"><span class="stat-label">総歩数</span><span class="stat-value" id="s-total-steps">0</span></div>
          <div class="stat-card"><span class="stat-label">総距離</span><span class="stat-value" id="s-total-dist">0m</span></div>
        </div>
      </div>
    </section>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-page="map">
        <span class="nav-icon">&#9716;</span>
        <span class="nav-label">マップ</span>
      </button>
      <button class="nav-btn" data-page="stats">
        <span class="nav-icon">&#9775;</span>
        <span class="nav-label">ステータス</span>
      </button>
    </nav>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
